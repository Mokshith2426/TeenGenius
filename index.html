<!doctype html>
<html lang="en">

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="shortcut icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    </noscript>

    <!-- Preload and asynchronously load KaTeX CSS to keep initial paint optimal -->
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" media="print" onload="this.media='all'" />

      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" />
